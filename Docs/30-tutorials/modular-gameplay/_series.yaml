      - 01-ModularGameplay是什么
  - stage: 核心类详解
    description: 掌握 ModularCharacter、ModularGameMode、ModularGameState 及其组件系统
    lessons:
      - 02-核心类详解
      - 03-组件生命周期
  - stage: Lyra 实战
    description: 学习 Lyra 如何应用 Modular Gameplay 架构
    lessons:
      - 04-Lyra实战
  - stage: 高级主题
    description: 自定义组件、最佳实践、性能优化
    lessons:
      - 05-ModularGameplay高级主题与最佳实践
tags: [modular-gameplay, component, architecture, lyra]
