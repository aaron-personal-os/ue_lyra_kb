  - stage: "进阶篇：StateTree"
    description: "学习 UE5 新状态树的事件驱动架构"
    lessons: [03-StateTree入门, 04-StateTree核心机制]
  
  - stage: "实战篇：对比与迁移"
    description: "Lyra 实战案例分析，BT → ST 迁移指南"
    lessons: [05-LyraAI实战Bot控制与BehaviorTree, 06-BehaviorTree到StateTree迁移指南]

tags: [AI, BehaviorTree, StateTree, Decision, Lyra]
