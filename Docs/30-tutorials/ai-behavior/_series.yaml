# Behavior Tree & StateTree 教程系列

name: "Behavior Tree 与 StateTree：从传统行为树到 UE5 新状态树"
slug: ai-behavior
description: "系统学习 UE 传统 Behavior Tree 基础，深入 UE5 新 StateTree 核心机制，掌握 AI 决策系统的选型与迁移"
difficulty_range: [beginner, advanced]
ue_version: "5.7"
total_lessons: 7
estimated_hours: 12

prerequisites:
  - series: ue-framework
    minimum: 01-game-loop
  - concept: C++ 基础
  - concept: AI 基本概念

learning_path:
  - stage: "基础篇：Behavior Tree"
    description: "掌握传统行为树的核心概念和使用方法"
