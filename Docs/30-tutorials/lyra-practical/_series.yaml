id: lyra-practical
name: "Lyra 项目架构与实战"
description: "从架构到实战，系统讲解 Lyra 项目如何组织代码、管理游戏状态、实现模块化游戏玩法，并结合源码分析每个系统的实现细节。"
difficulty: [beginner, advanced]
ue_version: "5.7"
total_lessons: 11
estimated_hours: 10
prerequisites:
  - series: ue-framework
    minimum: 03
    description: "了解 UE 框架基础（GameInstance、World、GameMode、Pawn、Controller）"
  - series: gas
    minimum: 01
    description: "了解 GAS 基础概念（Ability、Effect、Tag、Attribute）"
  - concept: "C++ 基础知识"
  - concept: "UE 反射系统基础"
learning_path:
  - stage: "基础架构"
    description: "理解 Lyra 的核心设计理念：模块化、Experience System、组件化"
    lessons: [00-Lyra项目架构与实战, 01-Lyra架构总览, 02-ExperienceSystem详解]
  - stage: "核心系统"
    description: "深入 Lyra 的 GameFeature、Pawn 组件、GAS 集成"
    lessons: [03-GameFeature与ModularGameplay模块化架构, 04-Pawn与组件系统, 05-Lyra中的GAS集成]
  - stage: "输入与 UI"
    description: "Lyra 的输入系统和 UI 框架集成"
    lessons: [06-Lyra输入系统详解, 07-LyraUI框架详解]
  - stage: "网络同步"
    description: "Lyra 的网络复制架构与性能优化"
    lessons: [08-Lyra网络同步详解]
  - stage: "实战与高级主题"
    description: "创建自定义游戏模式、性能优化、常见陷阱"
    lessons: [09-实战创建新的游戏模式, 10-高级主题与性能优化]
tags: [lyra, architecture, practical, game-feature, experience, modular-gameplay]
